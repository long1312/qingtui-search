const $q = document.getElementById('q');
const $brand = document.getElementById('brand');
const $tbody = document.getElementById('tbody');

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(){
  const kw = $q.value.trim().toLowerCase();
  const b = $brand.value;
  const filtered = DATA.filter(d=>{
    if(b && d.brand !== b) return false;
    if(kw){
      const hay = (d.name + d.series + d.brand).toLowerCase();
      if(!hay.includes(kw)) return false;
    }
    return true;
  });
  if(filtered.length === 0){
    $tbody.innerHTML = '<tr><td colspan="4"><div class="empty"><div class="icon">🔍</div>没有匹配的商品</div></td></tr>';
    return;
  }
  let html = '';
  for(const d of filtered){
    const thumb = d.img
      ? '<img loading="lazy" src="' + d.img + '" onerror="this.outerHTML=\'<div class=&quot;placeholder&quot;>—</div>\'">'
      : '<div class="placeholder">—</div>';
    html += '<tr>'
      + '<td class="thumb">' + thumb + '</td>'
      + '<td class="name">' + escapeHTML(d.name) + '</td>'
      + '<td class="brand">' + escapeHTML(d.brand) + '</td>'
      + '<td class="series">' + escapeHTML(d.series) + '</td>'
      + '</tr>';
  }
  $tbody.innerHTML = html;
}

$q.addEventListener('input', render);
$brand.addEventListener('change', render);
render();
</script>
