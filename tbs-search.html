  $count.textContent = (kw||ip) ? ('找到 ' + filtered.length + ' 款') : '';
  if(filtered.length === 0){
    $tbody.innerHTML = '<tr><td colspan="3"><div class="empty"><div class="icon">🔍</div>没有匹配的商品，该商品暂不支持先卖后寄</div></td></tr>';
    return;
  }
  const MAX = 600;
  let html = '';
  for(let i=0;i<filtered.length && i<MAX;i++){
    const d = filtered[i];
    const thumb = d.img
      ? '<img loading="lazy" referrerpolicy="no-referrer" src="' + d.img + '" onerror="this.outerHTML=\'<div class=&quot;placeholder&quot;>—</div>\'">'
      : '<div class="placeholder">—</div>';
    html += '<tr><td class="thumb">' + thumb + '</td><td class="name">' + escapeHTML(d.name) + '</td><td class="ip">' + (d.ip?escapeHTML(d.ip):'—') + '</td></tr>';
  }
  if(filtered.length > MAX){
    html += '<tr><td colspan="3" style="text-align:center;color:#a08bc0;font-size:12px;padding:14px">仅显示前 ' + MAX + ' 条，请用搜索或 IP 筛选缩小范围</td></tr>';
  }
  $tbody.innerHTML = html;
}
$q.addEventListener('input', render);
$ip.addEventListener('change', render);
render();
</script>
</body>
</html>
